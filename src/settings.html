<html>

<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .page-header img {
      width: 24px;
      height: 24px;
    }

    h1 {
      font-size: 1.2em;
      margin: 0;
    }

    .page-version {
      font-size: 0.85em;
      color: #555;
    }

    /* Settings tab */
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 640px;
    }

    td {
      padding: 6px 8px;
      vertical-align: top;
    }

    td:first-child {
      white-space: nowrap;
      font-weight: bold;
      width: 220px;
    }

    .description {
      font-size: 0.85em;
      color: #555;
      margin: 2px 0 0 0;
    }

    /* Configure folders tab */
    ul {
      list-style: none;
      padding-left: 20px;
    }

    #rootFolders {
      padding-left: 0;
    }

    img {
      vertical-align: middle;
      cursor: pointer;
    }

    label {
      padding-left: 5px;
    }

    label.folder-title {
      padding-right: 30px;
      cursor: pointer;
    }

    label.recursive {
      font-weight: bold;
    }

    .recursive-checkbox ~ p {
      display: none;
      font-style: italic;
    }

    .recursive-checkbox ~ ul {
      display: block;
    }

    .recursive-checkbox:checked ~ p {
      display: block;
    }

    .recursive-checkbox:checked ~ ul {
      display: none !important;
    }

    /* Tab content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Bottom toolbar */
    .btn-toolbar {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 640px;
    }

    button {
      padding: 6px 14px;
      margin-left: 4px;
      cursor: pointer;
      border-radius: 3px;
    }

    .tab-btn {
      background: #fff;
      border: 1px solid #aaa;
    }

    .tab-btn.active {
      background: #0060df;
      color: #fff;
      border-color: #0060df;
    }

    #btn-cancel {
      background: #fff;
      border: 1px solid #aaa;
    }

    #btn-reset {
      background: #ff9400;
      color: #fff;
      border: 1px solid #ff9400;
    }

    #btn-save {
      background: #0060df;
      color: #fff;
      border: 1px solid #0060df;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="page-header">
    <img id="page-icon" src="images/icon.svg" alt="" />
    <h1 id="page-title"></h1>
    <span class="page-version" id="page-version"></span>
  </div>

  <div id="tab-settings" class="tab-content active">
    <table>
      <tbody id="settings-rows"></tbody>
    </table>
  </div>

  <div id="tab-configure-folders" class="tab-content">
    <p id="page-description"></p>
    <ul id="rootFolders"></ul>
  </div>

  <div class="btn-toolbar">
    <div>
      <button type="button" id="btn-tab-settings" class="tab-btn active"></button>
      <button type="button" id="btn-tab-configure-folders" class="tab-btn"></button>
    </div>
    <div id="settings-actions">
      <button type="button" id="btn-cancel" disabled></button>
      <button type="button" id="btn-reset"></button>
      <button type="button" id="btn-save" disabled></button>
    </div>
  </div>

  <script src="settings.js"></script>
</body>

</html>
